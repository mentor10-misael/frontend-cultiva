<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <title>Calendário</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css">

<body>
  <header class="d-flex p-3 justify-content-between align-items-center border-bottom border-">
    <div>
      <span class="text-segundary">Olá,</span>
      <h2>Administrador</h2>
    </div>
    <button class="d-flex align-items-center gap-2" style="background: none; border: none;"><i class="bi bi-person-circle rounded-circle button-profile"></i><i class="bi bi-chevron-down text-secondary"></i></button>
  </header>
  <main class="p-3 mb-5 pb-5">
    <section class="calendario">
      <div class="agenda">
        <h1 class="">Agenda</h1>
        <button><img src="./assets/images/icons/mais.svg" width="24" height="24" alt=""></button>
      </div>

          <h2>fevereiro 2026</h2>

          </div>
        </div>

        <div class="semana-grid">
          <div>DOM</div>
          <div>SEG</div>
          <div>TER</div>
          <div>QUA</div>
          <div>QUI</div>
          <div>SEX</div>
          <div>SAB</div>
        </div>
        <div class="dias-grid">

          <button class="dia has-task">
            <span class="dia-selecionado ">1</span>
            <div class="lua"><img src="./assets/images/icons/lua-cheia.svg" width="32" height="32" alt="Lua cheia"></div>
          </button>
          <button class="dia">
            <span>2</span>
            <div class="lua"><img src="./assets/images/icons/lua-cheia.svg" width="32" height="32" alt="Lua cheia"></div>

            <div class="lua"><img src="./assets/images/icons/lua-minguante.svg" width="32" height="32" alt="Lua minguante"></div>
          </button>
          <button class="dia">
            <span>9</span>
            <div class="lua"><img src="./assets/images/icons/lua-minguante.svg" width="32" height="32" alt="Lua minguante"></div>

          <button class="dia">

      <div class="container container-info">

          <img src="./assets/images/icons/lua-minguante.svg" alt="Lua Minguante">

        </div>
        <button>
          <img src="./assets/images/icons/info.svg" alt="">

    <section>
      <div class="d-flex gap-3 mb-3">
        <i class="bi bi-calendar4" style="font-size: 1.5rem;"></i>
        <h2>Agenda do Dia</h2>
      </div>
      <div class="card border-2 shadow-sm rounded-4">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-3 p-2">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="opcao" id="opcao1" style="width: 25px; height: 25px;">
            </div>
            <div>
              <h5 class=" card-title">Aplicar inseticida</h5>
              <div class="card-text p- d-inline-block" style="background: #EFF6FF; border-radius: 49px; color: #155DFC;">
                <i class="bi bi-clock "></i>
                <span>
                  18:57
                </span>
              </div>
            </div>
          </div>
          <button class="btn ">
            <i class="bi bi-three-dots-vertical" style="font-size: 2rem;"></i>
          </button>
        </div>
      </div>
    </section>
  </main>
  <footer class="fixed-bottom border-top border-2">
    <nav>
      <ul class="list-unstyled d-flex justify-content-around m-0 p-2">
        <li>
          <a href="#" class="d-flex flex-column align-items-center text-decoration-none text-reset"><i class="bi bi-file-earmark-text" style="font-size: 1.5rem;"></i><span class="d-block link-unstyled">Início</span></a>
        </li>
        <li>
          <a href="#" class="d-flex flex-column align-items-center text-decoration-none text-reset"><i class="bi bi-wallet" style="font-size: 1.5rem;"></i><span>Custos</span></a>
        </li>
        <li>
          <a href="#" class="d-flex flex-column align-items-center text-decoration-none text-reset"><i class="bi bi-file-earmark-text" style="font-size: 1.5rem;"></i><span class="d-block">Notas</span></a>
        </li>
        <li>
          <a href="#" class="d-flex flex-column align-items-center text-decoration-none text-reset"><i class="bi bi-calendar4" style="font-size: 1.5rem;"></i><span class="d-block">Calendario</span></a>
        </li>
      </ul>
    </nav>
  </footer>
  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Bootstrap Icons -->
